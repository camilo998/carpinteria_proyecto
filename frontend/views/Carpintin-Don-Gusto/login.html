<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="/views/Carpintin-Don-Gusto/img/logo.jpg" type="image/jpg">
    <link rel="stylesheet" href="../../css/producto_estile.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Carpintería Don Gusto</title>
    <style>
        body {
            background-color: #FAF0E6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background-color: #FFF8DC;
            border: 2px solid #D2B48C;
            border-radius: 10px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        .login-container h1 {
            color: #8B4513;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin-bottom: 10px;
        }
        
        .login-container p {
            color: #A0522D;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group label {
            color: #8B4513;
            font-weight: bold;
        }
        
        .form-control {
            border: 1px solid #D2B48C;
            background-color: #FAF0E6;
        }
        
        .form-control:focus {
            border-color: #8B4513;
            box-shadow: 0 0 0 0.2rem rgba(139, 69, 19, 0.25);
        }
        
        .login-btn {
            background-color: #F4A460;
            color: #8B4513;
            border: 1px solid #8B4513;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease;
            width: 100%;
            font-weight: bold;
        }
        
        .login-btn:hover {
            background-color: #CD853F;
            color: white;
        }
        
        .demo-users {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #D2B48C;
        }
        
        .demo-users h3 {
            color: #8B4513;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .demo-user {
            background-color: #FFF8DC;
            border: 1px solid #D2B48C;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 1px;
        }
        
        .demo-user:hover {
            background-color: #D2B48C;
        }
        
        .demo-user strong {
            color: #8B4513;
        }
        
        .error {
            color: #c0392b;
            background: #fadbd8;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }
        
        .loading {
            color: #8B4513;
            text-align: center;
            display: none;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🪵 Carpintería Don Gusto</h1>
        <p>Inicia sesión para continuar</p>
        
        <div class="error" id="errorMsg"></div>
        <div class="loading" id="loading">Iniciando sesión...</div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            
            <button type="submit" class="login-btn">Iniciar Sesión</button>
        </form>
        
        <div class="demo-users">
            <h3>👤 Usuarios de Prueba:</h3>
            
            <div class="demo-user" onclick="autoLogin('admin@carpinteria.com', 'admin123')">
                <strong>ADMINISTRADOR</strong><br>
                Email: admin@carpinteria.com<br>
                Contraseña: admin123
            </div>
            
            <div class="demo-user" onclick="autoLogin('usuario@correo.com', 'usuario123')">
                <strong>USUARIO</strong><br>
                Email: usuario@correo.com<br>
                Contraseña: usuario123
            </div>
        </div>
    </div>
    
    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            console.log('Intentando login con:', email);
            errorMsg.style.display = 'none';
            loading.style.display = 'block';
            
            try {
                console.log('Enviando solicitud al servidor...');
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                console.log('Respuesta recibida, status:', response.status);
                const data = await response.json();
                console.log('Datos recibidos:', data);
                
                if (data.success) {
                    console.log('Login exitoso, guardando token...');
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    
                    console.log('Redirigiendo según rol:', data.usuario.rol);
                    if (data.usuario.rol === 'admin') {
                        window.location.href = '/views/Carpintin-Don-Gusto/panel-admin.html';
                    } else {
                        window.location.href = '/views/Carpintin-Don-Gusto/productos.html';
                    }
                } else {
                    console.log('Login fallido:', data.mensaje);
                    throw new Error(data.mensaje);
                }
            } catch (error) {
                console.error('Error en login:', error);
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                loading.style.display = 'none';
            }
        });
        
        function autoLogin(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            loginForm.dispatchEvent(new Event('submit'));
        }
    </script>
</body>
</html>
